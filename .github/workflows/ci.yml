name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/monitoring-system

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --timeout=5m

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -count=1 -race -timeout=60s ./cmd/...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests (Testcontainers)
        run: go test -count=1 -race -timeout=120s -tags=integration ./internal/storage/...

  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.collector
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/collector:latest,${{ env.IMAGE_PREFIX }}/collector:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build aggregator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aggregator
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/aggregator:latest,${{ env.IMAGE_PREFIX }}/aggregator:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/api:latest,${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/agent:latest,${{ env.IMAGE_PREFIX }}/agent:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-k8s:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create migrations ConfigMap
        run: |
          kubectl create configmap db-migrations \
            --from-file=migrations/ \
            -n monitoring \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run DB migrations Job
        run: |
          # Удаляем старый Job если есть, затем применяем новый
          kubectl delete job db-migrate -n monitoring --ignore-not-found
          kubectl apply -f deployments/k8s/migrations-job.yaml
          kubectl wait --for=condition=complete job/db-migrate -n monitoring --timeout=120s

      - name: Update image tags
        run: |
          SHA=${{ github.sha }}
          PREFIX=${{ env.IMAGE_PREFIX }}
          kubectl set image deployment/collector  collector=${PREFIX}/collector:${SHA}  -n monitoring
          kubectl set image deployment/aggregator aggregator=${PREFIX}/aggregator:${SHA} -n monitoring
          kubectl set image deployment/api        api=${PREFIX}/api:${SHA}              -n monitoring
          kubectl set image daemonset/agent       agent=${PREFIX}/agent:${SHA}          -n monitoring

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/collector  -n monitoring --timeout=120s
          kubectl rollout status deployment/aggregator -n monitoring --timeout=120s
          kubectl rollout status deployment/api        -n monitoring --timeout=120s
