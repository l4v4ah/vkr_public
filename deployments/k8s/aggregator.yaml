apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator
  namespace: monitoring
  labels:
    app: aggregator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8082"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: aggregator
          image: monitoring/aggregator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: health
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: HEALTH_ADDR
              value: ":8082"
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: url
            - name: LOG_LEVEL
              value: "info"
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aggregator-hpa
  namespace: monitoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aggregator
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
