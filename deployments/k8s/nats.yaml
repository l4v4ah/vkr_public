apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: monitoring
data:
  nats.conf: |
    jetstream {
      store_dir: /data
      max_mem: 256m
      max_file: 2g
    }
    max_payload: 1MB
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: monitoring
  labels:
    app: nats
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: nats-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: monitoring
spec:
  selector:
    app: nats
  clusterIP: None   # headless — StatefulSet нужен стабильный DNS
  ports:
    - port: 4222
      name: client
    - port: 8222
      name: monitoring
