# ВНИМАНИЕ: этот файл — шаблон. НЕ коммитьте реальные пароли.
# Перед деплоем замените значения или создайте Secret вручную:
#
#   kubectl create secret generic postgres-secret \
#     --from-literal=user=monitoring \
#     --from-literal=password=<STRONG_PASSWORD> \
#     --from-literal=url="postgres://monitoring:<STRONG_PASSWORD>@postgres:5432/monitoring?sslmode=disable" \
#     -n monitoring
#
#   kubectl create secret generic api-secret \
#     --from-literal=api-key=<RANDOM_32_BYTE_HEX> \
#     -n monitoring
#
# Значения ниже — base64 от строк-заглушек для локальной разработки.
# monitoring  → bW9uaXRvcmluZw==
# postgres://monitoring:monitoring@postgres:5432/monitoring?sslmode=disable → (base64 ниже)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: monitoring
type: Opaque
data:
  user:     bW9uaXRvcmluZw==
  password: bW9uaXRvcmluZw==
  url:      cG9zdGdyZXM6Ly9tb25pdG9yaW5nOm1vbml0b3JpbmdAcG9zdGdyZXM6NTQzMi9tb25pdG9yaW5nP3NzbG1vZGU9ZGlzYWJsZQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: monitoring
type: Opaque
data:
  # echo -n "change-me-in-production" | base64
  api-key: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=
