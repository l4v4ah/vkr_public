run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck       # unchecked errors
    - gosimple       # simplification suggestions
    - govet          # go vet
    - ineffassign    # ineffectual assignments
    - staticcheck    # static analysis
    - unused         # unused code
    - gofmt          # formatting
    - goimports      # import ordering
    - misspell       # spelling
    - revive         # opinionated linting
    - godot          # comment punctuation
    - exhaustruct    # all struct fields initialised
    - bodyclose      # HTTP response body closed
    - contextcheck   # context passed correctly
    - noctx          # no http.NewRequest without context
    - rowserrcheck   # sql.Rows.Err() checked
    - sqlclosecheck  # sql.Rows/Stmt closed
    - gocritic       # code style
    - gocognit       # cognitive complexity

linters-settings:
  gocognit:
    min-complexity: 20
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: package-comments
  exhaustruct:
    exclude:
      # stdlib — zero-value fields are intentional
      - "net/http.*"
      - "sync.*"
      - "testing.*"
      # third-party types — zero-value fields are intentional
      - "github.com/gin-gonic/gin.*"
      - "go.opentelemetry.io/otel/.*"
      - "go.uber.org/zap.*"
      - "github.com/jackc/pgx/.*"
      - "github.com/nats-io/nats.go.*"
      - "github.com/nats-io/nats.go/jetstream.*"
      - "google.golang.org/grpc.*"
      - "github.com/prometheus/.*"
      - "github.com/golang-migrate/.*"
      - "github.com/testcontainers/.*"
      - "github.com/shirou/gopsutil/.*"
      - "google.golang.org/protobuf/.*"
      - "google.golang.org/grpc/.*"
      # own types — mutex/atomic zero-value fields are intentional
      - "github.com/slava-kov/monitoring-system/.*"

issues:
  exclude-rules:
    - path: "_test.go"
      linters: [exhaustruct, godot]
    # inline field-hint comments (e.g. "// e.g. :8080") are not sentences
    - linters: [godot]
      source: "^\\s*//"
      text: "e\\.g\\."
